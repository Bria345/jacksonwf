<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="src/style.css" />
     <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Jackson Weather</title>
</head>
<body>
  <div class="weather-app">
    <header>
        <form class="search-form" id="search-form">
            <input type="search" placeholder="Enter a City.." required id="search-form-input" class="search-form-input"/>
            <input type="submit" value="Search" class="search-form-button"/>
        </form>
    </header>
        <main>
            <div class="weather-info">   
            <div>
            <h1 class="weather-city" id="weather-city">Cayman Islands</h1> 

            <p class="weather-description">
                Tuesday - 12:00 PM,Sunny
                <br /> 
                Humidity: <strong> 60%</strong>, Wind: <strong>10 mph</strong>
            </p>
          </div>
          <div class="weather-temp-container "</div>
                <div class="weather-temp-icon"> ☀️</div> 
                <div class="weather-temp-value"> 82</div>
                <div class="weather-temp-unit">°F</div>

            </div>
            </main>
                 
    <footer>
Coded with ❤️ by
<a href="https://github.com/Bria345/">
Briana Jackson</a>, is <a href="https://github.com/Bria345/JacksonWF">open-sourced on GitHub</a> and 
<a href="https://jacksonwf.netlify.app/"> hosted on Netlify</a>.    
   </footer>
</div>
<script src="src/index.js"></script>
</body>
</html>
